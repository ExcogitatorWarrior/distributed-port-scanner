<!doctype html>
<html>
	<head>
		<title>Agent Details - Distributed Port Scanner</title>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					'Helvetica Neue', Arial, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				padding: 40px 20px;
			}

			.container {
				max-width: 1200px;
				margin: 0 auto;
				background: white;
				border-radius: 20px;
				box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
				overflow: hidden;
				animation: slideIn 0.5s ease-out;
			}

			@keyframes slideIn {
				from {
					opacity: 0;
					transform: translateY(-30px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* Header Styles */
			.header {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				padding: 30px 40px;
			}

			.header h1 {
				font-size: 28px;
				margin-bottom: 10px;
				display: flex;
				justify-content: space-between;
				align-items: center;
				flex-wrap: wrap;
				gap: 15px;
			}

			.agent-info {
				background: rgba(255, 255, 255, 0.1);
				padding: 15px;
				border-radius: 10px;
				margin-top: 15px;
				display: flex;
				gap: 20px;
				flex-wrap: wrap;
			}

			.agent-info-item {
				flex: 1;
				min-width: 150px;
			}

			.agent-info-item label {
				font-size: 12px;
				opacity: 0.9;
				display: block;
				margin-bottom: 5px;
			}

			.agent-info-item span {
				font-size: 16px;
				font-weight: 500;
			}

			/* Button Styles */
			.btn {
				padding: 10px 20px;
				border: none;
				border-radius: 8px;
				font-size: 14px;
				font-weight: 500;
				cursor: pointer;
				transition: all 0.3s ease;
				text-decoration: none;
				display: inline-flex;
				align-items: center;
				gap: 8px;
			}

			.btn-primary {
				background: white;
				color: #667eea;
			}

			.btn-primary:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
			}

			.btn-danger {
				background: #ff4757;
				color: white;
			}

			.btn-danger:hover {
				background: #ff3838;
				transform: translateY(-2px);
			}

			.btn-success {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
			}

			.btn-success:hover {
				transform: translateY(-2px);
				box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
			}

			.btn-secondary {
				background: #e0e0e0;
				color: #666;
			}

			.btn-secondary:hover {
				background: #d0d0d0;
			}

			.btn-back {
				background: rgba(255, 255, 255, 0.2);
				color: white;
				border: 1px solid rgba(255, 255, 255, 0.3);
			}

			.btn-back:hover {
				background: rgba(255, 255, 255, 0.3);
				transform: translateY(-2px);
			}

			/* Content Styles */
			.content {
				padding: 40px;
			}

			.section-title {
				font-size: 24px;
				color: #333;
				margin-bottom: 20px;
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.section-title::before {
				content: '';
				width: 4px;
				height: 24px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				border-radius: 2px;
			}

			/* Task List Styles */
			.task-list {
				list-style: none;
			}

			.task-item {
				background: #f8f9fa;
				border-radius: 12px;
				margin-bottom: 15px;
				border: 1px solid #e0e0e0;
				transition: all 0.3s ease;
				overflow: hidden;
			}

			.task-item:hover {
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
				transform: translateY(-2px);
			}

			.task-header {
				padding: 20px;
				cursor: pointer;
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
				gap: 15px;
				align-items: center;
				background: white;
				transition: background 0.3s ease;
			}

			.task-header:hover {
				background: #f8f9fa;
			}

			.task-name {
				font-weight: 600;
				color: #333;
				font-size: 16px;
			}

			.task-targets,
			.task-ports,
			.task-schedule {
				color: #666;
				font-size: 14px;
			}

			.status {
				padding: 4px 12px;
				border-radius: 20px;
				font-size: 12px;
				font-weight: 600;
				text-align: center;
				display: inline-block;
			}

			.status.active {
				background: #d4edda;
				color: #155724;
			}

			.status.inactive {
				background: #f8d7da;
				color: #721c24;
			}

			.task-details {
				display: none;
				padding: 20px;
				background: #f8f9fa;
				border-top: 1px solid #e0e0e0;
				animation: fadeIn 0.3s ease;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.task-item.active .task-details {
				display: block;
			}

			.task-details ul {
				list-style: none;
			}

			.task-details li {
				background: white;
				padding: 15px;
				border-radius: 8px;
				margin-bottom: 10px;
				border-left: 4px solid #667eea;
				display: flex;
				justify-content: space-between;
				align-items: center;
				flex-wrap: wrap;
				gap: 10px;
				transition: all 0.3s ease;
			}

			.task-details li:hover {
				transform: translateX(5px);
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
			}

			.task-details li.alert {
				border-left-color: #ff4757;
				background: #fff5f5;
			}

			.task-details li.done {
				border-left-color: #28a745;
				background: #f0fff4;
			}

			.task-details li.running {
				border-left-color: #ffc107;
				background: #fffbf0;
			}

			.task-info {
				flex: 1;
				font-size: 14px;
				color: #555;
			}

			.btn-small {
				padding: 6px 12px;
				font-size: 12px;
				background: #667eea;
				color: white;
				border: none;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.3s ease;
			}

			.btn-small:hover {
				background: #5a67d8;
				transform: translateY(-1px);
			}

			/* Modal Styles */
			.modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.6);
				justify-content: center;
				align-items: center;
				z-index: 1000;
				animation: fadeIn 0.3s ease;
			}

			.modal-content {
				background: white;
				border-radius: 20px;
				width: 90%;
				max-width: 500px;
				animation: slideUp 0.3s ease;
				overflow: hidden;
			}

			@keyframes slideUp {
				from {
					transform: translateY(50px);
					opacity: 0;
				}
				to {
					transform: translateY(0);
					opacity: 1;
				}
			}

			.modal-header {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: white;
				padding: 20px;
			}

			.modal-header h2 {
				font-size: 20px;
				margin: 0;
			}

			.modal-body {
				padding: 30px;
			}

			.modal-body label {
				display: block;
				margin-bottom: 8px;
				color: #333;
				font-weight: 500;
				font-size: 14px;
			}

			.modal-body input,
			.modal-body textarea {
				width: 100%;
				padding: 10px;
				border: 2px solid #e0e0e0;
				border-radius: 8px;
				font-size: 14px;
				transition: all 0.3s ease;
				margin-bottom: 20px;
			}

			.modal-body input:focus,
			.modal-body textarea:focus {
				outline: none;
				border-color: #667eea;
			}

			.modal-footer {
				padding: 20px;
				background: #f8f9fa;
				display: flex;
				justify-content: flex-end;
				gap: 10px;
			}

			.error-message {
				background: #f8d7da;
				color: #721c24;
				padding: 10px;
				border-radius: 8px;
				margin-top: 10px;
				font-size: 14px;
				display: none;
			}

			/* Loading Spinner */
			.loading {
				text-align: center;
				padding: 40px;
			}

			.spinner {
				border: 3px solid #f3f3f3;
				border-top: 3px solid #667eea;
				border-radius: 50%;
				width: 40px;
				height: 40px;
				animation: spin 1s linear infinite;
				margin: 0 auto;
			}

			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}

			/* Responsive */
			@media (max-width: 768px) {
				.content {
					padding: 20px;
				}

				.task-header {
					grid-template-columns: 1fr;
				}

				.task-details li {
					flex-direction: column;
					align-items: flex-start;
				}

				.btn-small {
					align-self: flex-end;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="header">
				<h1>
					<div style="display: flex; align-items: center; gap: 15px">
						<button
							class="btn btn-back"
							onclick="goBackToAgentsList()"
						>
							← Back to Agents
						</button>
						Agent Details
					</div>
					<div>
						<button
							class="btn btn-primary"
							onclick="openModal()"
						>
							➕ Create Task
						</button>
						<a
							href="/accounts/logout/"
							style="text-decoration: none"
						>
							<button class="btn btn-danger">🚪 Logout</button>
						</a>
					</div>
				</h1>
				<div class="agent-info">
					<div class="agent-info-item">
						<label>Agent Name</label>
						<span id="agent-name">Loading...</span>
					</div>
					<div class="agent-info-item">
						<label>Last Contact</label>
						<span id="agent-last-contact">Loading...</span>
					</div>
					<div class="agent-info-item">
						<label>Last Seen</label>
						<span id="agent-last-seen">Loading...</span>
					</div>
				</div>
			</div>

			<div class="content">
				<div class="section-title">Tasks</div>
				<ul
					id="task-list"
					class="task-list"
				>
					<div class="loading">
						<div class="spinner"></div>
						<p style="margin-top: 10px; color: #666">Loading tasks...</p>
					</div>
				</ul>
			</div>
		</div>

		<!-- Create Task Modal -->
		<div
			id="createTaskModal"
			class="modal"
		>
			<div class="modal-content">
				<div class="modal-header">
					<h2>Create New Task</h2>
				</div>
				<div class="modal-body">
					<label>Task Name</label>
					<input
						type="text"
						id="task-name"
						placeholder="Enter task name"
					/>

					<label>Targets</label>
					<input
						type="text"
						id="task-targets"
						placeholder="e.g., 192.168.1.1, 10.0.0.1"
					/>

					<label>Ports</label>
					<input
						type="text"
						id="task-ports"
						placeholder="e.g., 80, 443, 22"
					/>

					<label>Schedule</label>
					<input
						type="text"
						id="task-schedule"
						placeholder="e.g., daily, hourly, 2024-12-31T10:00"
					/>
				</div>
				<div class="modal-footer">
					<button
						class="btn btn-secondary"
						onclick="closeModal()"
					>
						Cancel
					</button>
					<button
						class="btn btn-success"
						onclick="submitTask()"
					>
						Create Task
					</button>
				</div>
			</div>
		</div>

		<!-- Change Allowed Ports Modal -->
		<div
			id="allowedPortsModal"
			class="modal"
		>
			<div class="modal-content">
				<div class="modal-header">
					<h2>Change Allowed Ports</h2>
				</div>
				<div class="modal-body">
					<label>Allowed Ports (comma-separated)</label>
					<input
						type="text"
						id="allowedPorts"
						placeholder="e.g., 80, 443, 22"
					/>
					<div
						id="errorMessage"
						class="error-message"
					></div>
				</div>
				<div class="modal-footer">
					<button
						class="btn btn-secondary"
						onclick="closeAllowedPortsModal()"
					>
						Cancel
					</button>
					<button
						class="btn btn-success"
						onclick="updateAllowedPorts()"
					>
						Update Ports
					</button>
				</div>
			</div>
		</div>

		<script>
			let currentTaskItemId = null

			function getCookie(name) {
				let cookieValue = null
				if (document.cookie && document.cookie !== '') {
					const cookies = document.cookie.split(';')
					for (let i = 0; i < cookies.length; i++) {
						const cookie = cookies[i].trim()
						if (cookie.substring(0, name.length + 1) === name + '=') {
							cookieValue = decodeURIComponent(
								cookie.substring(name.length + 1)
							)
							break
						}
					}
				}
				return cookieValue
			}

			function getAgentIdFromURL() {
				const urlParts = window.location.pathname.split('/')
				return urlParts[urlParts.length - 2]
			}

			function goBackToAgentsList() {
				// Go back to the agents list page
				window.location.href = '/admin-ui/agents/'
			}

			function loadAgentDetails() {
				const agentId = getAgentIdFromURL()

				fetch(`/api/admin/agents/${agentId}/`)
					.then(response => {
						if (!response.ok)
							throw new Error(`HTTP ${response.status}: ${response.statusText}`)
						return response.json()
					})
					.then(data => {
						const agent = data.agent

						const agentNameElement = document.getElementById('agent-name')
						const agentLastContactElement =
							document.getElementById('agent-last-contact')
						const agentLastSeenElement =
							document.getElementById('agent-last-seen')

						if (agentNameElement)
							agentNameElement.innerText = agent.name || 'N/A'
						if (agentLastContactElement)
							agentLastContactElement.innerText =
								agent.last_contact_at || 'Never'
						if (agentLastSeenElement)
							agentLastSeenElement.innerText = agent.last_seen || 'Never'

						const taskList = document.getElementById('task-list')
						taskList.innerHTML = ''

						if (!agent.tasks || agent.tasks.length === 0) {
							taskList.innerHTML =
								'<div style="text-align: center; padding: 40px; color: #999;">📭 No tasks available. Create your first task!</div>'
							return
						}

						agent.tasks.forEach(task => {
							const taskItem = document.createElement('li')
							taskItem.className = 'task-item'

							// Безопасная обработка данных
							const safeTaskName = escapeHtml(task.name || 'Unnamed Task')
							const safeTaskTargets = Array.isArray(task.targets)
								? task.targets.join(', ')
								: task.targets || 'None'
							const safeTaskPorts = Array.isArray(task.ports)
								? task.ports.join(', ')
								: task.ports || 'None'
							const safeTaskSchedule = escapeHtml(
								task.schedule || 'No schedule'
							)

							// Обработка items (может быть null, undefined или пустой массив)
							let itemsHtml = ''
							if (task.items && task.items.length > 0) {
								itemsHtml = task.items
									.map(item => {
										const safeIp = escapeHtml(item.ip || 'Unknown')
										const safeStatus = item.status
											? item.status.toUpperCase()
											: 'PENDING'
										const safeFoundPorts =
											item.found_ports && item.found_ports.length
												? item.found_ports.join(', ')
												: 'None'
										const safeAllowedPorts =
											item.allowed_ports && item.allowed_ports.length
												? item.allowed_ports.join(', ')
												: 'None'

										return `
                            <li class="${item.status || 'pending'}">
                                <div class="task-info">
                                    <strong>IP:</strong> ${safeIp} | 
                                    <strong>Status:</strong> <span class="status ${item.status || 'pending'}">${safeStatus}</span> | 
                                    <strong>Found Ports:</strong> ${safeFoundPorts} | 
                                    <strong>Allowed Ports:</strong> ${safeAllowedPorts}
                                </div>
                                <button class="btn-small" onclick="openAllowedPortsModal(${item.id})">⚙️ Change Allowed Ports</button>
                            </li>
                        `
									})
									.join('')
							} else {
								itemsHtml =
									'<li style="text-align: center; color: #999; padding: 20px;">⏳ No scan results yet. Task is pending or in progress.</li>'
							}

							taskItem.innerHTML = `
                    <div class="task-header">
                        <div class="task-name">📋 ${safeTaskName}</div>
                        <div class="task-targets">🎯 ${safeTaskTargets}</div>
                        <div class="task-ports">🔌 ${safeTaskPorts}</div>
                        <div class="task-schedule">⏰ ${safeTaskSchedule}</div>
                        <div><span class="status ${task.is_active ? 'active' : 'inactive'}">${task.is_active ? 'ACTIVE' : 'INACTIVE'}</span></div>
                    </div>
                    <div class="task-details">
                        <ul>
                            ${itemsHtml}
                        </ul>
                    </div>
                `

							const header = taskItem.querySelector('.task-header')
							if (header) {
								header.addEventListener('click', e => {
									if (!e.target.classList.contains('btn-small')) {
										taskItem.classList.toggle('active')
									}
								})
							}

							taskList.appendChild(taskItem)
						})
					})
					.catch(error => {
						console.error('Error loading agent details:', error)
						const taskList = document.getElementById('task-list')
						if (taskList) {
							taskList.innerHTML =
								'<div style="text-align: center; padding: 40px; color: #dc3545;">❌ Failed to load agent details. Please try again.</div>'
						}
					})
			}

			function escapeHtml(str) {
				if (!str) return ''
				return str.replace(/[&<>]/g, function (m) {
					if (m === '&') return '&amp;'
					if (m === '<') return '&lt;'
					if (m === '>') return '&gt;'
					return m
				})
			}

			function openModal() {
				document.getElementById('createTaskModal').style.display = 'flex'
			}

			function closeModal() {
				document.getElementById('createTaskModal').style.display = 'none'
				document.getElementById('task-name').value = ''
				document.getElementById('task-targets').value = ''
				document.getElementById('task-ports').value = ''
				document.getElementById('task-schedule').value = ''
			}

			async function submitTask() {
				const name = document.getElementById('task-name').value
				const targets = document
					.getElementById('task-targets')
					.value.split(',')
					.map(t => t.trim())
				const ports = document
					.getElementById('task-ports')
					.value.split(',')
					.map(p => p.trim())
				const schedule = document.getElementById('task-schedule').value
				const agent_id = getAgentIdFromURL()

				if (!name || !targets.length || !ports.length) {
					alert('Please fill in all required fields.')
					return
				}

				const taskData = { name, agent_id, targets, ports, schedule }
				const csrfToken = getCookie('csrftoken')

				try {
					const res = await fetch('/api/admin/create-task/', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							'X-CSRFToken': csrfToken
						},
						credentials: 'same-origin',
						body: JSON.stringify(taskData)
					})

					const data = await res.json()

					if (data.status === 'created') {
						alert('✅ Task created successfully!')
						closeModal()
						loadAgentDetails()
					} else {
						alert('❌ Error creating task: ' + (data.error || 'Unknown error'))
					}
				} catch (error) {
					console.error(error)
					alert('❌ Failed to create task. Please try again.')
				}
			}

			function openAllowedPortsModal(itemId) {
				currentTaskItemId = itemId
				document.getElementById('allowedPorts').value = ''
				document.getElementById('errorMessage').style.display = 'none'
				document.getElementById('allowedPortsModal').style.display = 'flex'

				// Optional: Load current allowed ports
				fetch(`/api/admin/task-item/${itemId}/update-allowed-ports/`, {
					method: 'GET',
					headers: {
						'Content-Type': 'application/json'
					}
				})
					.then(response => response.json())
					.then(data => {
						if (data.allowed_ports) {
							document.getElementById('allowedPorts').value =
								data.allowed_ports.join(', ')
						}
					})
					.catch(error => console.error('Error loading current ports:', error))
			}

			function closeAllowedPortsModal() {
				document.getElementById('allowedPortsModal').style.display = 'none'
				currentTaskItemId = null
			}

			async function updateAllowedPorts() {
				const allowedPortsInput = document.getElementById('allowedPorts')
				const allowedPorts = allowedPortsInput.value
					.split(',')
					.map(port => {
						const trimmedPort = port.trim()
						const parsedPort = parseInt(trimmedPort, 10)
						return isNaN(parsedPort) ? null : parsedPort
					})
					.filter(port => port !== null)

				if (allowedPorts.length === 0) {
					const errorDiv = document.getElementById('errorMessage')
					errorDiv.style.display = 'block'
					errorDiv.innerText =
						'Please enter valid integers for allowed ports (e.g., 80, 443, 22)'
					return
				}

				document.getElementById('errorMessage').style.display = 'none'

				const data = { allowed_ports: allowedPorts }
				const csrfToken = getCookie('csrftoken')

				try {
					const res = await fetch(
						`/api/admin/task-item/${currentTaskItemId}/update-allowed-ports/`,
						{
							method: 'POST',
							headers: {
								'Content-Type': 'application/json',
								'X-CSRFToken': csrfToken
							},
							credentials: 'same-origin',
							body: JSON.stringify(data)
						}
					)

					const responseData = await res.json()

					if (res.ok) {
						alert('✅ Allowed ports updated successfully!')
						closeAllowedPortsModal()
						loadAgentDetails()
					} else {
						const errorDiv = document.getElementById('errorMessage')
						errorDiv.style.display = 'block'
						errorDiv.innerText =
							responseData.error || 'An error occurred while updating.'
					}
				} catch (error) {
					console.error(error)
					const errorDiv = document.getElementById('errorMessage')
					errorDiv.style.display = 'block'
					errorDiv.innerText =
						'Failed to update allowed ports. Please try again.'
				}
			}

			window.onclick = function (event) {
				const createModal = document.getElementById('createTaskModal')
				const portsModal = document.getElementById('allowedPortsModal')
				if (event.target === createModal) closeModal()
				if (event.target === portsModal) closeAllowedPortsModal()
			}

			loadAgentDetails()
		</script>
	</body>
</html>
